# Dependabot keeps Go modules and GitHub Actions versions current.
#
# Cadence + grouping rationale:
#  - Weekly on Monday — reviewable in one focused window rather than scattered
#    daily PRs that get ignored.
#  - Minor/patch updates are grouped into a single PR per ecosystem because
#    they're high-confidence, low-blast-radius. Bundling cuts review overhead
#    and keeps CI cycles down.
#  - Major updates land as individual PRs so they get scrutinized per-bump.
#
# Auto-merge policy: NONE here. Backend changes auto-deploy to prod when
# staging is down (see CLAUDE.md "CI deploy gating"), so every dep bump goes
# through human review even when CI is green. Re-evaluate if/when staging
# becomes always-on.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Halifax"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Halifax"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Docker base image updates (distroless and migrate base layers).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Halifax"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
