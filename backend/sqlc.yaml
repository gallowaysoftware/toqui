version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "dbgen"
        out: "internal/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "date"
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "jsonb"
            go_type:
              type: "json.RawMessage"
              import: "encoding/json"
          - db_type: "geography"
            go_type:
              type: "string"
              pointer: true
