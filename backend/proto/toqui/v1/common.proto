syntax = "proto3";

package toqui.v1;

option go_package = "github.com/gallowaysoftware/toqui/backend/gen/toqui/v1;toquiv1";

import "buf/validate/validate.proto";

message LatLng {
  double latitude = 1 [(buf.validate.field).double = {gte: -90, lte: 90}];
  double longitude = 2 [(buf.validate.field).double = {gte: -180, lte: 180}];
}

message DateRange {
  string start_date = 1; // YYYY-MM-DD
  string end_date = 2;   // YYYY-MM-DD
}

message PaginationRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
  string page_token = 2;
}

message PaginationResponse {
  string next_page_token = 1;
  int32 total_count = 2;
}
