<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8654A" />
    <title>Toqui - Offline</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: #faf8f5;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }

      .container {
        text-align: center;
        max-width: 28rem;
      }

      .icon {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1.5rem;
        background-color: #fef2f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon svg {
        width: 2.5rem;
        height: 2.5rem;
        color: #e8654a;
      }

      .brand {
        font-size: 1.5rem;
        font-weight: 700;
        color: #e8654a;
        margin-bottom: 0.5rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #111827;
        margin-bottom: 0.75rem;
      }

      p {
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 1rem;
      }

      .cached-hint {
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 1rem 1.25rem;
        margin-top: 1.5rem;
        text-align: left;
      }

      .cached-hint-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: #111827;
        margin-bottom: 0.25rem;
      }

      .cached-hint-text {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 0;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.625rem 1.25rem;
        background-color: #e8654a;
        color: #ffffff;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .retry-btn:hover {
        background-color: #c44a32;
      }

      .retry-btn:focus-visible {
        outline: 2px solid #e8654a;
        outline-offset: 2px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #16162a;
          color: #e8e8f0;
        }

        h1 {
          color: #e8e8f0;
        }

        p {
          color: #9ca3b8;
        }

        .icon {
          background-color: #2a1f1e;
        }

        .cached-hint {
          background-color: #1a1a2e;
          border-color: #2d2d50;
        }

        .cached-hint-title {
          color: #e8e8f0;
        }

        .cached-hint-text {
          color: #9ca3b8;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
          />
        </svg>
      </div>

      <div class="brand">Toqui</div>
      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Some features won't be available until
        you're back online.
      </p>

      <div class="cached-hint">
        <div class="cached-hint-title">Your trips are still here</div>
        <p class="cached-hint-text">
          Previously viewed itineraries and trip details are cached and available offline. Try
          navigating to a trip you've visited before.
        </p>
      </div>

      <button class="retry-btn" onclick="window.location.reload()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"
          />
        </svg>
        Try again
      </button>
    </div>
  </body>
</html>
