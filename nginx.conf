server {
    listen 8080;
    root /usr/share/nginx/html;

    # Security headers (in server block, inherited by locations without add_header)
    include /etc/nginx/security-headers.conf;

    # SPA routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared trip pages — inject Open Graph meta tags for social media crawlers.
    # Crawlers (iMessage, WhatsApp, Twitter, Facebook, Slack) don't execute JS,
    # so client-side meta tags won't work. We use sub_filter to inject generic
    # OG tags into the HTML <head> for these paths.
    #
    # OG share image: og-default.png (1200x630) hosted on the marketing site.
    location ~ ^/shared/ {
        try_files /index.html =404;
        sub_filter '</head>' '<meta property="og:title" content="Check out this trip on Toqui" /><meta property="og:description" content="AI-powered travel itinerary with expert recommendations" /><meta property="og:image" content="https://toqui.travel/og-default.png" /><meta property="og:type" content="website" /><meta property="og:site_name" content="Toqui" /><meta name="twitter:card" content="summary_large_image" /><meta name="twitter:title" content="Check out this trip on Toqui" /><meta name="twitter:description" content="AI-powered travel itinerary with expert recommendations" /><meta name="twitter:image" content="https://toqui.travel/og-default.png" /></head>';
        sub_filter_once on;
        sub_filter_types text/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/security-headers.conf;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (they have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri =404;
    }

    # Don't cache index.html or config.json (always serve fresh for SPA updates)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        include /etc/nginx/security-headers.conf;
    }

    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'" always;
    }
}
