# Self-host docker-compose for Toqui.
#
# Usage:
#   cp .env.example .env       # then fill in at least ANTHROPIC_API_KEY
#   docker compose up -d       # frontend on :3000, backend on :8090
#
# Provider options:
#   - Claude only (default): set ANTHROPIC_API_KEY.
#   - OpenAI / OpenAI-compatible: set OPENAI_API_KEY (+ optional OPENAI_BASE_URL).
#   - Gemini via Vertex AI: set GOOGLE_APPLICATION_CREDENTIALS to a mounted
#     service account key path, plus VERTEX_AI_PROJECT_ID. Vertex is GCP-only.
#
# Optional Google OAuth: set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET. Leaving
# them unset means email+password sign-in is the only path (which is fine).

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: toqui
      POSTGRES_USER: toqui
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toqui}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toqui"]
      interval: 2s
      timeout: 5s
      retries: 10

  firestore:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud emulators firestore start --host-port=0.0.0.0:8080
    # Firestore emulator stores chat history. For real persistence, point the
    # backend at a managed Firestore instead (FIRESTORE_PROJECT_ID + ADC).

  migrate:
    build: ./backend
    command:
      - "/migrate"
      - "-dir"
      - "/migrations"
      - "-db"
      - "postgres://toqui:${POSTGRES_PASSWORD:-toqui}@postgres:5432/toqui?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DATABASE_URL: "postgres://toqui:${POSTGRES_PASSWORD:-toqui}@postgres:5432/toqui?sslmode=disable"
      FIRESTORE_EMULATOR_HOST: "firestore:8080"
      FIRESTORE_PROJECT_ID: "toqui-self-host"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required — generate one with: openssl rand -hex 32}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      CORS_ALLOWED_ORIGINS: "${FRONTEND_URL:-http://localhost:3000}"
      # AI providers — at least one of these must be set.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      VERTEX_AI_PROJECT_ID: "${VERTEX_AI_PROJECT_ID:-}"
      VERTEX_AI_LOCATION: "${VERTEX_AI_LOCATION:-us-central1}"
      # Optional Google OAuth — leave unset for email+password only.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}"
    depends_on:
      postgres:
        condition: service_healthy
      firestore:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  frontend:
    build: .
    ports:
      - "3000:8080"
    environment:
      EXPO_PUBLIC_API_URL: "${EXPO_PUBLIC_API_URL:-http://localhost:8090}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    depends_on:
      - backend

volumes:
  postgres_data:
