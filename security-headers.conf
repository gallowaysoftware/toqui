# Shared security headers — included in each location block.
# nginx does not inherit server-level add_header when a location defines its own,
# so we use an include to keep headers consistent and DRY.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://secure.helcimpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.toqui.travel https://staging-api.toqui.travel https://eu.i.posthog.com https://*.ingest.de.sentry.io https://api.open-meteo.com https://climate-api.open-meteo.com https://clients3.google.com; frame-src https://secure.helcimpay.com; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
