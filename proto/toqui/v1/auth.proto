syntax = "proto3";

package toqui.v1;

option go_package = "github.com/gallowaysoftware/toqui-backend/gen/toqui/v1;toquiv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc GoogleLogin(GoogleLoginRequest) returns (GoogleLoginResponse);
  rpc FacebookLogin(FacebookLoginRequest) returns (FacebookLoginResponse);
  rpc AppleLogin(AppleLoginRequest) returns (AppleLoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);

  // Privacy / data lifecycle
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
  rpc ExportData(ExportDataRequest) returns (ExportDataResponse);
}

message GoogleLoginRequest {
  string code = 1 [(buf.validate.field).string.min_len = 1];
  string redirect_uri = 2 [(buf.validate.field).string.min_len = 1];
  string code_verifier = 3;  // PKCE code verifier (optional, for S256 challenge)
  // Optional. Base64-encoded JSON with whitelisted UTM/ref attribution captured
  // by the marketing site (toqui-site/AttributionCapture.astro) on first
  // visit. Forwarded as PostHog `signup_completed` event properties on
  // first-ever login per user, then discarded. The whitelist is enforced
  // server-side: anything outside {ref, utm_source, utm_medium,
  // utm_campaign} is dropped. Bad input is logged and ignored — login
  // never fails over a malformed attribution string. See audit issue #39 A-2.
  string attribution = 4;
}

message GoogleLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  bool consent_pending = 4;  // True when the user has not yet accepted terms/privacy
  // True when the user has not yet completed the 18+ age gate
  // (POST /auth/verify-age). The frontend mounts the age form
  // immediately after login when this is set. The check is also
  // enforced server-side by the age interceptor on every gated RPC,
  // so this flag is purely a UX hint — bypassing it doesn't bypass
  // the gate. Mirrors the consent_pending pattern.
  bool age_verification_required = 5;
}

message FacebookLoginRequest {
  string access_token = 1 [(buf.validate.field).string.min_len = 1];
  // Optional attribution payload — see GoogleLoginRequest.attribution.
  string attribution = 2;
}

message FacebookLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  bool consent_pending = 4;  // True when the user has not yet accepted terms/privacy
  bool age_verification_required = 5;  // see GoogleLoginResponse
}

// Apple Sign-In: the frontend (expo-apple-authentication) returns an
// authorization_code + id_token after the user taps "Sign in with Apple."
// The backend exchanges the code with Apple, verifies the signed ID token,
// and creates / links a Toqui user account.
message AppleLoginRequest {
  string authorization_code = 1 [(buf.validate.field).string.min_len = 1];
  string id_token = 2 [(buf.validate.field).string.min_len = 1];
  // Optional. The Services-ID redirect URI the frontend supplied during the
  // initial authorization request. Apple verifies this against the value it
  // saw client-side, so it must match exactly.
  string redirect_uri = 3;
  // Optional attribution payload — see GoogleLoginRequest.attribution.
  string attribution = 4;
}

message AppleLoginResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  bool consent_pending = 5;  // True when the user has not yet accepted terms/privacy
  bool age_verification_required = 6;  // see GoogleLoginResponse
}

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatar_url = 4;
  google.protobuf.Timestamp created_at = 5;
  // When the user completed age verification (POST /auth/verify-age).
  // Unset for users who have not yet verified. Used by the frontend
  // to skip the AgeGate modal for returning users.
  google.protobuf.Timestamp age_verified_at = 7;
}

// Account deletion — GDPR Article 17 (Right to Erasure)
message DeleteAccountRequest {
  // Require explicit confirmation to prevent accidental deletion
  bool confirm = 1 [(buf.validate.field).bool.const = true];
}

message DeleteAccountResponse {
  string request_id = 1;
  string message = 2; // e.g., "Your account deletion has been initiated..."
}

// Data export — GDPR Article 20 (Right to Data Portability)
message ExportDataRequest {}

message ExportDataResponse {
  string request_id = 1;
  string message = 2; // e.g., "Your data export is being prepared..."
}
