syntax = "proto3";

package toqui.v1;

option go_package = "github.com/gallowaysoftware/toqui-backend/gen/toqui/v1;toquiv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "toqui/v1/common.proto";
import "toqui/v1/persona.proto";
import "toqui/v1/trip.proto";

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (stream SendMessageResponse);
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);
  rpc ListChatSessions(ListChatSessionsRequest) returns (ListChatSessionsResponse);
}

message SendMessageRequest {
  // Optional: empty starts a new session. When set, must be a valid UUID.
  string session_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  // Optional: empty for selection mode (no trip selected). When set, must be
  // a valid UUID.
  string trip_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string content = 3 [(buf.validate.field).string = {min_len: 1, max_len: 10000}];
  ChatMode mode = 4;
  LatLng user_location = 5;
  // Optional: override the active persona for this message
  string persona_id = 6;
  // Optional: file attachments (images, PDFs, text files)
  repeated Attachment attachments = 7;
}

message Attachment {
  string filename = 1;
  string media_type = 2; // e.g. "image/jpeg", "application/pdf"
  bytes data = 3;
  int64 size_bytes = 4;
}

enum ChatMode {
  CHAT_MODE_UNSPECIFIED = 0;
  CHAT_MODE_PLANNING = 1;
  CHAT_MODE_COMPANION = 2;
  CHAT_MODE_SELECTION = 3;
}

message SendMessageResponse {
  oneof event {
    TextDelta text_delta = 1;
    ToolCall tool_call = 2;
    ToolResult tool_result = 3;
    ItineraryUpdate itinerary_update = 4;
    MessageComplete message_complete = 5;
    SessionCreated session_created = 6;
    ErrorEvent error = 7;
    PersonaSwitch persona_switch = 8;
    TripCreated trip_created = 9;
    TripSelected trip_selected = 10;
  }
}

// Sent when the AI creates a trip during selection mode chat
message TripCreated {
  Trip trip = 1;
}

// Sent when the AI selects an existing trip from the user's list
message TripSelected {
  Trip trip = 1;
}

// Sent when the active persona changes mid-conversation
// (e.g., arriving at a destination triggers a local guide)
message PersonaSwitch {
  Persona previous_persona = 1;
  Persona new_persona = 2;
  string handoff_message = 3;  // e.g., "Welcome to Tokyo! Meet Hana..."
}

message TextDelta {
  string text = 1;
}

message ToolCall {
  string tool_name = 1;
  string input_json = 2;
}

message ToolResult {
  string tool_name = 1;
  string result_json = 2;
}

message ItineraryUpdate {
  string trip_id = 1;
  Itinerary itinerary = 2;
}

message MessageComplete {
  string message_id = 1;
  string session_id = 2;
  string full_content = 3;
}

message SessionCreated {
  string session_id = 1;
}

message ErrorEvent {
  string message = 1;
  string code = 2;
}

message ChatSession {
  string id = 1;
  string trip_id = 2;
  ChatMode mode = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_message_at = 5;
  string active_persona_id = 6;
}

message ChatMessage {
  string id = 1;
  string session_id = 2;
  string role = 3;
  string content = 4;
  map<string, string> metadata = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetChatHistoryRequest {
  // Optional: empty means "get latest session". When set, must be a valid UUID.
  string session_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string trip_id = 2 [(buf.validate.field).string.uuid = true];
  PaginationRequest pagination = 3;
}

message GetChatHistoryResponse {
  repeated ChatMessage messages = 1;
  PaginationResponse pagination = 2;
}

message ListChatSessionsRequest {
  string trip_id = 1 [(buf.validate.field).string.uuid = true];
  PaginationRequest pagination = 2;
}

message ListChatSessionsResponse {
  repeated ChatSession sessions = 1;
  PaginationResponse pagination = 2;
}
