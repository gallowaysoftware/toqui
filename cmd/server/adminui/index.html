<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toqui Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;max-width:960px;margin:0 auto;padding:1.5rem;background:#f9fafb;color:#111}
    .hidden{display:none!important}
    a{color:#E8654A;text-decoration:none}a:hover{text-decoration:underline}
    button{background:#E8654A;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.875rem}
    button:hover{background:#d4573f}button:disabled{opacity:.5}
    input{padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:6px;font-size:.875rem;width:100%}
    input:focus{outline:none;box-shadow:0 0 0 2px #E8654A40;border-color:#E8654A}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{text-align:left;padding:.625rem .75rem;font-size:.75rem;font-weight:600;color:#6b7280;text-transform:uppercase;background:#f9fafb;border-bottom:1px solid #e5e7eb}
    td{padding:.625rem .75rem;border-bottom:1px solid #f3f4f6}
    code{background:#f3f4f6;padding:.1rem .4rem;border-radius:3px;font-size:.8rem}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:.75rem;border-bottom:2px solid #E8654A;margin-bottom:1.5rem}
    .hdr h1{color:#E8654A;font-size:1.4rem}
    .tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:1.5rem}
    .tabs a{padding:.6rem 1.2rem;cursor:pointer;border-bottom:2px solid transparent;color:#9ca3af;font-size:.875rem}
    .tabs a:hover{color:#374151;text-decoration:none}
    .tabs a.on{color:#E8654A;border-bottom-color:#E8654A;font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.25rem;text-align:center}
    .card .v{font-size:2rem;font-weight:700;color:#E8654A}
    .card .l{font-size:.75rem;color:#9ca3af;margin-top:.2rem}
    .tbl{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
    .gate{text-align:center;padding:8rem 1rem}
    .gate h2{margin-bottom:.5rem;font-size:1.5rem}
    .gate p{color:#9ca3af;margin-bottom:2rem}
    .gate button{padding:.75rem 2rem;font-size:1rem;border-radius:8px}
    .ok{color:#16a34a}.warn{color:#d97706}
    .badge{background:#f3f4f6;color:#6b7280;padding:.15rem .5rem;border-radius:4px;font-size:.75rem}
    .form-row{display:flex;gap:.5rem;align-items:end;flex-wrap:wrap}
    .form-row label{flex:1;min-width:200px;font-size:.85rem;color:#6b7280}
    .form-row input{margin-top:.25rem}
  </style>
</head>
<body>
  <div id="loading" style="text-align:center;padding:8rem 0;color:#9ca3af">Loading...</div>
  <div id="auth-gate" class="hidden"></div>
  <div id="app" class="hidden"></div>

  <script>
    const API = window.location.origin;

    function showAuthGate() {
      q('loading').classList.add('hidden');
      q('app').classList.add('hidden');
      const el = q('auth-gate');
      el.innerHTML = '<div class="gate"><h2>Toqui Admin</h2><p>Sign in with an admin account to continue.</p><button onclick="location.href=\'/auth/google/login?return=admin\'">Sign in with Google</button></div>';
      el.classList.remove('hidden');
    }

    function showApp() {
      q('loading').classList.add('hidden');
      q('auth-gate').classList.add('hidden');
      const el = q('app');
      el.innerHTML = `
        <div class="hdr"><h1>Toqui Admin</h1></div>
        <div class="tabs">
          <a onclick="tab('dashboard')" id="t-dashboard" class="on">Dashboard</a>
          <a onclick="tab('waitlist')" id="t-waitlist">Waitlist</a>
          <a onclick="tab('users')" id="t-users">Users</a>
          <a onclick="tab('tools')" id="t-tools">Tools</a>
        </div>
        <div id="v-dashboard"><div class="grid" id="stats"></div></div>
        <div id="v-waitlist" class="hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h2 style="font-size:1.1rem">Waitlist</h2><span id="wl-total" style="color:#9ca3af;font-size:.85rem"></span></div>
          <div class="tbl"><table><thead><tr><th>Email</th><th>Signed Up</th><th>Verified</th><th>Invite</th><th>Accepted</th><th></th></tr></thead><tbody id="wl-body"></tbody></table></div>
        </div>
        <div id="v-users" class="hidden">
          <h2 style="font-size:1.1rem;margin-bottom:.75rem">Users</h2>
          <input type="search" id="usearch" placeholder="Search by email or name..." oninput="dsearch()" style="max-width:320px;margin-bottom:1rem">
          <div class="tbl"><table><thead><tr><th>Email</th><th>Name</th><th>Tier</th><th>Created</th></tr></thead><tbody id="u-body"></tbody></table></div>
        </div>
        <div id="v-tools" class="hidden">
          <h2 style="font-size:1.1rem;margin-bottom:.75rem">Manual Trip Unlock</h2>
          <form class="form-row" onsubmit="unlock(event)">
            <label>User ID<input type="text" id="uid" required></label>
            <label>Trip ID<input type="text" id="tid" required></label>
            <button type="submit">Unlock</button>
          </form>
          <p id="ures" style="margin-top:.5rem;font-size:.85rem"></p>
        </div>`;
      el.classList.remove('hidden');
      loadStats();
    }

    function q(id){return document.getElementById(id)}

    async function api(path, opts) {
      const res = await fetch(API + path, { credentials: 'include', ...opts });
      if (res.status === 401 || res.status === 403) { showAuthGate(); throw new Error('unauthorized'); }
      return res.json();
    }

    function tab(name) {
      ['dashboard','waitlist','users','tools'].forEach(t => {
        const v = q('v-'+t), tb = q('t-'+t);
        if(v){if(t===name)v.classList.remove('hidden');else v.classList.add('hidden')}
        if(tb){tb.className=t===name?'on':''}
      });
      if(name==='dashboard')loadStats();if(name==='waitlist')loadWL();if(name==='users')loadU();
    }

    async function loadStats() {
      const d = await api('/admin/stats');
      q('stats').innerHTML=[['Users',d.total_users],['Waitlist',d.waitlist_count],['Trips',d.active_trips],['Msgs Today',d.daily_messages],['Pro Interest',d.pro_interest]].map(([l,v])=>`<div class="card"><div class="v">${v??0}</div><div class="l">${l}</div></div>`).join('');
    }

    async function loadWL() {
      const d = await api('/admin/waitlist?page_size=100');
      q('wl-total').textContent=`${d.total??0} total`;
      q('wl-body').innerHTML=(d.entries||[]).map(e=>{
        const c=e.invite_code?.String||e.invite_code||'',hc=e.invite_code?.Valid!==false&&c;
        const acc=e.accepted_at?.Valid?new Date(e.accepted_at.Time).toLocaleDateString():'';
        const ver=e.verified_at?.Valid;
        const act=!acc&&!hc?`<button onclick="invite('${e.email}',this)" style="padding:.2rem .6rem;font-size:.75rem">Invite</button>`:'';
        return`<tr><td>${e.email}</td><td>${new Date(e.signed_up_at).toLocaleDateString()}</td><td>${ver?'<span class="ok">Yes</span>':'<span class="warn">No</span>'}</td><td>${hc?`<code>${c}</code>`:'—'}</td><td>${acc||'—'}</td><td>${act}</td></tr>`;
      }).join('');
    }

    async function invite(email,btn){
      btn.disabled=true;btn.textContent='...';
      try{const d=await api('/admin/invite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});btn.outerHTML=`<code>${d.invite_code}</code>`}
      catch{btn.disabled=false;btn.textContent='Failed'}
    }

    let st;function dsearch(){clearTimeout(st);st=setTimeout(loadU,300)}

    async function loadU(){
      const s=q('usearch')?.value||'';
      const d=await api(s?`/admin/users?q=${encodeURIComponent(s)}&page_size=50`:'/admin/users?page_size=50');
      q('u-body').innerHTML=(d.users||[]).map(u=>`<tr><td>${u.email}</td><td>${u.name?.String||u.name||''}</td><td><span class="badge">${u.subscription_tier?.String||u.subscription_tier||'free'}</span></td><td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('');
    }

    async function unlock(e){
      e.preventDefault();const r=q('ures');
      try{await api('/admin/unlock-trip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:q('uid').value,trip_id:q('tid').value})});r.textContent='Unlocked!';r.style.color='#16a34a'}
      catch{r.textContent='Failed.';r.style.color='red'}
    }

    (async()=>{
      const el=document.getElementById('loading');
      try{
        el.textContent='Checking auth...';
        const res=await fetch(API+'/admin/stats',{credentials:'include'});
        el.textContent='Got response: '+res.status;
        if(res.status===401||res.status===403){showAuthGate();return}
        const data=await res.json();
        showApp();
      }catch(e){
        el.textContent='Error: '+e.message;
        showAuthGate();
      }
    })();
  </script>
</body>
</html>
