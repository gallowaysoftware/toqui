<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toqui Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { --pico-primary: #E8654A; --pico-primary-hover: #d4573f; }
    body { max-width: 960px; margin: 0 auto; padding: 1rem 1.5rem; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 2px solid var(--pico-primary); padding-bottom: 0.75rem; }
    header h1 { margin: 0; font-size: 1.5rem; color: var(--pico-primary); }
    header small { color: var(--pico-muted-color); font-size: 0.85rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--pico-primary); line-height: 1.2; }
    .stat-card .label { font-size: 0.8rem; color: var(--pico-muted-color); margin-top: 0.25rem; }
    nav { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--pico-muted-border-color); padding-bottom: 0; }
    nav a { padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; color: var(--pico-muted-color); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--pico-color); }
    nav a.active { color: var(--pico-primary); border-bottom-color: var(--pico-primary); font-weight: 600; }
    .hidden { display: none !important; }
    table { font-size: 0.85rem; }
    .invite-btn { padding: 0.25rem 0.75rem; font-size: 0.8rem; cursor: pointer; }
    #loading { text-align: center; padding: 6rem 1rem; }
    #auth-gate { text-align: center; padding: 6rem 1rem; }
    #auth-gate h2 { margin-bottom: 0.5rem; }
    #auth-gate p { color: var(--pico-muted-color); margin-bottom: 2rem; }
    code { font-size: 0.8rem; padding: 0.15rem 0.4rem; }
    .verified { color: green; }
    .unverified { color: orange; }
  </style>
</head>
<body>
  <!-- Loading state (shown first) -->
  <div id="loading">
    <p aria-busy="true">Loading admin panel...</p>
  </div>

  <!-- Auth gate (shown if not admin) -->
  <div id="auth-gate" style="display:none">
    <h2>Toqui Admin</h2>
    <p>You must be signed in as an admin to access this panel.</p>
    <a href="/auth/google/login?redirect=admin" role="button">Sign in with Google</a>
  </div>

  <!-- Main app (shown after auth) -->
  <div id="app" style="display:none">
    <header>
      <div>
        <h1>Toqui Admin</h1>
      </div>
      <small id="admin-user"></small>
    </header>

    <nav>
      <a onclick="showTab('dashboard')" id="tab-dashboard">Dashboard</a>
      <a onclick="showTab('waitlist')" id="tab-waitlist">Waitlist</a>
      <a onclick="showTab('users')" id="tab-users">Users</a>
      <a onclick="showTab('tools')" id="tab-tools">Tools</a>
    </nav>

    <!-- Dashboard -->
    <section id="view-dashboard">
      <div class="stats-grid" id="stats-grid"></div>
    </section>

    <!-- Waitlist -->
    <section id="view-waitlist" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 style="margin:0">Waitlist</h2>
        <span id="waitlist-total" style="color:var(--pico-muted-color);font-size:0.9rem"></span>
      </div>
      <table>
        <thead><tr><th>Email</th><th>Signed Up</th><th>Verified</th><th>Invite Code</th><th>Accepted</th><th>Action</th></tr></thead>
        <tbody id="waitlist-body"></tbody>
      </table>
    </section>

    <!-- Users -->
    <section id="view-users" class="hidden">
      <h2>Users</h2>
      <input type="search" id="user-search" placeholder="Search by email or name..." oninput="debounceSearch()">
      <table>
        <thead><tr><th>Email</th><th>Name</th><th>Tier</th><th>Created</th></tr></thead>
        <tbody id="users-body"></tbody>
      </table>
    </section>

    <!-- Tools -->
    <section id="view-tools" class="hidden">
      <h2>Manual Trip Unlock</h2>
      <form onsubmit="unlockTrip(event)" style="display:flex;gap:0.5rem;align-items:end;flex-wrap:wrap">
        <label style="flex:1;min-width:200px">User ID<input type="text" id="unlock-user-id" required style="margin-bottom:0"></label>
        <label style="flex:1;min-width:200px">Trip ID<input type="text" id="unlock-trip-id" required style="margin-bottom:0"></label>
        <button type="submit" style="margin-bottom:0">Unlock</button>
      </form>
      <p id="unlock-result" style="margin-top:0.5rem"></p>
    </section>
  </div>

  <script>
    const API = window.location.origin;

    async function api(path, opts) {
      const res = await fetch(API + path, { credentials: 'include', ...opts });
      if (res.status === 401 || res.status === 403) {
        showAuthGate();
        throw new Error('unauthorized');
      }
      return res.json();
    }

    function showAuthGate() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth-gate').style.display = '';
    }

    function showApp() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('app').style.display = '';
    }

    // Tab switching
    function showTab(name) {
      document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + name)?.classList.remove('hidden');
      document.getElementById('tab-' + name)?.classList.add('active');
      if (name === 'dashboard') loadStats();
      if (name === 'waitlist') loadWaitlist();
      if (name === 'users') loadUsers();
    }

    // Dashboard
    async function loadStats() {
      const data = await api('/admin/stats');
      const grid = document.getElementById('stats-grid');
      grid.innerHTML = '';
      for (const [label, value] of [
        ['Total Users', data.total_users],
        ['Waitlist', data.waitlist_count],
        ['Active Trips', data.active_trips],
        ["Today's Messages", data.daily_messages],
        ['Pro Interest', data.pro_interest],
      ]) {
        grid.innerHTML += `<div class="stat-card"><div class="value">${value ?? 0}</div><div class="label">${label}</div></div>`;
      }
    }

    // Waitlist
    async function loadWaitlist() {
      const data = await api('/admin/waitlist?page_size=100');
      document.getElementById('waitlist-total').textContent = `${data.total ?? 0} total`;
      const tbody = document.getElementById('waitlist-body');
      tbody.innerHTML = '';
      for (const e of (data.entries || [])) {
        const code = e.invite_code?.String || e.invite_code || '';
        const codeValid = e.invite_code?.Valid !== false && code;
        const accepted = e.accepted_at?.Valid ? new Date(e.accepted_at.Time).toLocaleDateString() : '';
        const verified = e.verified_at?.Valid;
        const verifiedLabel = verified
          ? `<span class="verified">Yes</span>`
          : `<span class="unverified">No</span>`;
        const actionBtn = !accepted && !codeValid
          ? `<button class="invite-btn" onclick="generateInvite('${e.email}', this)">Invite</button>`
          : '';
        tbody.innerHTML += `<tr>
          <td>${e.email}</td>
          <td>${new Date(e.signed_up_at).toLocaleDateString()}</td>
          <td>${verifiedLabel}</td>
          <td>${codeValid ? `<code>${code}</code>` : '—'}</td>
          <td>${accepted || '—'}</td>
          <td>${actionBtn}</td>
        </tr>`;
      }
    }

    async function generateInvite(email, btn) {
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const data = await api('/admin/invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        btn.outerHTML = `<code>${data.invite_code}</code>`;
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Failed';
      }
    }

    // Users
    let searchTimer;
    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadUsers(), 300);
    }

    async function loadUsers() {
      const q = document.getElementById('user-search').value;
      const path = q ? `/admin/users?q=${encodeURIComponent(q)}&page_size=50` : '/admin/users?page_size=50';
      const data = await api(path);
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = '';
      for (const u of (data.users || [])) {
        const name = u.name?.String || u.name || '';
        const tier = u.subscription_tier?.String || u.subscription_tier || 'free';
        tbody.innerHTML += `<tr>
          <td>${u.email}</td>
          <td>${name}</td>
          <td>${tier}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
        </tr>`;
      }
    }

    // Trip unlock
    async function unlockTrip(e) {
      e.preventDefault();
      const result = document.getElementById('unlock-result');
      try {
        await api('/admin/unlock-trip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: document.getElementById('unlock-user-id').value,
            trip_id: document.getElementById('unlock-trip-id').value,
          }),
        });
        result.textContent = 'Trip unlocked!';
        result.style.color = 'green';
      } catch (err) {
        result.textContent = 'Failed to unlock trip.';
        result.style.color = 'red';
      }
    }

    // Init — check auth, then show app or gate
    (async () => {
      try {
        await loadStats();
        showApp();
        document.getElementById('tab-dashboard').classList.add('active');
      } catch (e) {
        // showAuthGate already called by api()
      }
    })();
  </script>
</body>
</html>
