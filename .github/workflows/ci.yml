name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync('go tool cover -func=coverage.out').toString();

            // Extract total line
            const lines = output.trim().split('\n');
            const totalLine = lines[lines.length - 1];
            const totalMatch = totalLine.match(/([\d.]+)%/);
            const total = totalMatch ? totalMatch[1] : '?';

            // Build per-package summary
            const pkgCoverage = {};
            for (const line of lines) {
              const match = line.match(/^(.+?)\/.+?\s+.+?\s+([\d.]+)%$/);
              if (match) {
                const pkg = match[1];
                if (!pkgCoverage[pkg]) pkgCoverage[pkg] = [];
                pkgCoverage[pkg].push(parseFloat(match[2]));
              }
            }

            let table = '| Package | Coverage |\n|---------|----------|\n';
            for (const [pkg, values] of Object.entries(pkgCoverage)) {
              const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1);
              table += `| \`${pkg.replace('github.com/gallowaysoftware/toqui-backend/', '')}\` | ${avg}% |\n`;
            }

            const body = `## Test Coverage: ${total}%\n\n${table}`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Test Coverage:'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  deploy-staging:
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      IMAGE: northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-backend/toqui-backend

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker northamerica-northeast1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Run migrations (before deploy to avoid schema mismatch)
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret=staging-database-url \
            --project=toqui-staging)
          gcloud run jobs deploy toqui-migrate \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-staging \
            --service-account=toqui-run-toqui-backend@toqui-staging.iam.gserviceaccount.com \
            --set-cloudsql-instances=toqui-staging:northamerica-northeast1:toqui-staging-db \
            --set-env-vars="DATABASE_URL=${DB_URL}" \
            --command="/migrate" \
            --args="-direction,up" \
            --execute-now \
            --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy toqui-backend \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-staging

      - name: Smoke test staging health endpoint
        # Cloud Run ingress on staging is `internal-and-cloud-load-balancing`,
        # so `gcloud run services describe ... --format='value(status.url)'`
        # returns the *.run.app URL which is blocked at Google's edge for any
        # public client (including this GHA runner) regardless of IAM. The
        # LB-fronted hostname `staging-api.toqui.travel` is the real entry
        # point — it's provisioned by the `load_balancer` module in
        # toqui-terraform (environments/staging/main.tf) and is what actual
        # users and agentic tests hit. Probe it directly. Fixes #336.
        run: |
          STAGING_URL=https://staging-api.toqui.travel
          echo "Checking staging health at ${STAGING_URL}/healthz"
          for i in 1 2 3 4 5; do
            # -sS silences progress but still surfaces transport errors on stderr,
            # so a hung LB or DNS hiccup shows up in the job log instead of an
            # opaque "got HTTP ". --connect-timeout / --max-time bound each
            # attempt so a stuck TCP handshake can't swallow the whole job.
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 5 --max-time 10 \
              "${STAGING_URL}/healthz" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 5 attempts"
          exit 1

  deploy-prod:
    needs: [lint, test, build]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    env:
      IMAGE: northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-backend/toqui-backend

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push
        run: |
          gcloud auth configure-docker northamerica-northeast1-docker.pkg.dev --quiet
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Run migrations (before deploy to avoid schema mismatch)
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret=prod-database-url \
            --project=toqui-prod)
          gcloud run jobs deploy toqui-migrate \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-prod \
            --service-account=toqui-run-toqui-backend@toqui-prod.iam.gserviceaccount.com \
            --set-cloudsql-instances=toqui-prod:northamerica-northeast1:toqui-db \
            --set-env-vars="DATABASE_URL=${DB_URL}" \
            --command="/migrate" \
            --args="-direction,up" \
            --execute-now \
            --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy toqui-backend \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-prod
