name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [web, ios, android]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx expo export --platform ${{ matrix.platform }} --output-dir dist/${{ matrix.platform }} --clear
      - uses: actions/upload-artifact@v6
        if: matrix.platform == 'web'
        with:
          name: web-build
          path: dist/web

  deploy-staging:
    name: Deploy to Staging
    needs: [typecheck, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build web (no secrets baked in — config.json is generated at runtime)
      - name: Build web for staging
        run: npx expo export --platform web --output-dir dist/web --clear
      # Docker build BEFORE GCP auth (auth@v2 can interfere with Docker Hub pulls)
      - name: Build Docker image
        run: |
          IMAGE=northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-frontend/toqui-frontend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Push Docker image
        run: |
          IMAGE=northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-frontend/toqui-frontend
          gcloud auth configure-docker northamerica-northeast1-docker.pkg.dev --quiet
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
      - name: Deploy to Cloud Run
        # Use --update-env-vars (not --set-env-vars) so we don't wipe
        # Terraform-managed env vars (POSTHOG_KEY, SENTRY_DSN, etc.) on
        # every deploy. --set-env-vars replaces the ENTIRE env var set;
        # that was silently clearing analytics + error tracking and, when
        # vars.GOOGLE_CLIENT_ID was unset, clearing the OAuth client ID
        # too — which broke Google sign-in on app.toqui.travel.
        run: |
          IMAGE=northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-frontend/toqui-frontend
          gcloud run deploy toqui-frontend \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-staging \
            --port=8080 \
            --allow-unauthenticated \
            --remove-secrets=GOOGLE_CLIENT_ID \
            --update-env-vars="EXPO_PUBLIC_API_URL=https://staging-api.toqui.travel,GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}"

  deploy-prod:
    name: Deploy to Production
    needs: [typecheck, test, build]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE: northamerica-northeast1-docker.pkg.dev/toqui-infra/toqui-frontend/toqui-frontend
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_PROD_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Verify staging image exists
        run: |
          gcloud artifacts docker images describe $IMAGE:${{ github.sha }} \
            --project=toqui-infra || \
            (echo "ERROR: Image $IMAGE:${{ github.sha }} not found. Run staging deploy first." && exit 1)
      - name: Deploy to Cloud Run (promote staging image)
        # Use --update-env-vars (not --set-env-vars) so we don't wipe
        # Terraform-managed env vars (POSTHOG_KEY, SENTRY_DSN, etc.) on
        # every deploy. See staging deploy comment above.
        run: |
          gcloud run deploy toqui-frontend \
            --image=$IMAGE:${{ github.sha }} \
            --region=northamerica-northeast1 \
            --project=toqui-prod \
            --port=8080 \
            --allow-unauthenticated \
            --remove-secrets=GOOGLE_CLIENT_ID \
            --update-env-vars="EXPO_PUBLIC_API_URL=https://api.toqui.travel,GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}"
